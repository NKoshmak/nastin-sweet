<svg width="69" height="69" viewBox="0 0 69 69" xmlns="http://www.w3.org/2000/svg">

  <!-- OUTER CIRCLE (brand dark + white stroke) -->
  <circle 
    cx="34.5" 
    cy="34.5" 
    r="34" 
    fill="#3e4c6f" 
    stroke="#ffffff"
  />

  <!-- EMAIL ICON (white) -->
  <g clip-path="url(#clip)">
    <!-- Envelope Outline -->
    <rect 
      x="21" 
      y="26" 
      width="27" 
      height="18" 
      rx="3" 
      stroke="#ffffff" 
      stroke-width="2.4"
      fill="none"
    />

    <!-- Envelope Flap -->
    <path 
      d="M22.5 27.5L34.5 36L46.5 27.5" 
      stroke="#ffffff" 
      stroke-width="2.4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- SAME RADIAL HIGHLIGHT AS INSTAGRAM -->
  <defs>
    <radialGradient id="highlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(34.5 34.5) rotate(90) scale(34.5)">
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.20"/>
    </radialGradient>

    <clipPath id="clip">
      <rect width="31" height="31" x="19" y="19" />
    </clipPath>
  </defs>

</svg>